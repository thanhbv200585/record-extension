<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">AutoFlow</div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="open-tester" class="small-btn" title="API Tester">
           🚀
        </button>
        <button id="open-dashboard" class="small-btn" title="Open Dashboard" style="padding: 4px 8px; font-size: 14px;">
           ⚙️
        </button>
        <div id="status" class="status-badge">Idle</div>
      </div>
    </div>

    <div class="actions-row">
      <button id="record-toggle" class="main-btn btn-record" title="Start/Stop Recording">
        <span class="icon">⏺</span>
        <span id="record-text">Start Recording</span>
      </button>
      <label for="import-input" class="secondary-btn" title="Import Session JSON">
        <span>📥</span>
        <input type="file" id="import-input" accept=".json" style="display:none">
      </label>
    </div>

    <div class="divider"></div>

    <div class="history-section">
      <div class="section-title">Recent Flows</div>
      <div id="session-list" class="session-list">
        <!-- Sessions will be injected here -->
        <div id="empty-state">No flows recorded yet</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
